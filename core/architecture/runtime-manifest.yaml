      llm_engine: claude_cli
      llm_model: claude-opus-4-6
      llm_model_changeability: code-pinned

  - id: meeting-sync-late
    enabled: true
    schedule_local: "Daily 21:15 America/New_York"
    launchd_label: com.matthewlieber.automation-personal.meeting-sync-late
