        - draft routing
        - digest rendering and send
      llm_stages:
        - thread enrichment
        - draft authoring
        - project refresh substep
      llm_engine: claude_cli
      llm_model: claude-opus-4-6
      llm_model_changeability: env-configurable

  - id: email-monitor
    enabled: true
    schedule_local: "Every 2 hours from 08:00 to 18:00 America/New_York"
    launchd_label: com.matthewlieber.automation-work.email-monitor
    script: core/automation/email-monitor.sh
    launchd_plist: core/automation/launchd-plists/com.brain.email-monitor.plist
    outputs:
      - logs/email-monitor.log
    state_files:
      - core/state/email-monitor-state.json
      - core/state/telegram-brain.json
    execution:
      deterministic_stages:
        - Gmail search
        - state update
        - Telegram delivery
      llm_stages:
        - urgency triage
        - draft decisioning
      llm_engine: claude_cli
      llm_model: claude-opus-4-6 for main run; haiku for failure alert path
      llm_model_changeability: code-pinned

  - id: comms-ingest
    enabled: true
    schedule_local: "Every 30 minutes America/New_York"
    launchd_label: com.matthewlieber.automation-work.comms-ingest
    script: core/automation/comms-ingest.sh
    launchd_plist: core/automation/launchd-plists/com.brain.comms-ingest.plist
    outputs:
      - logs/comms-ingest.log
      - core/state/comms-events.jsonl
    state_files:
      - core/state/comms-ingest-state.json
      - core/state/beeper-chat-watchlist.json
    execution:
      deterministic_stages:
        - communication ingest
        - event log write
        - state update
      llm_stages: []
      llm_engine: none
      llm_model: none
      llm_model_changeability: not_applicable

  - id: pnt-sync
    enabled: true
    schedule_local: "Daily 16:00 America/New_York"
    launchd_label: com.matthewlieber.automation-work.pnt-sync
    script: core/automation/pnt-sync.sh
    launchd_plist: core/automation/launchd-plists/com.brain.pnt-sync.plist
    outputs:
      - logs/pnt-sync.log
      - Knowledge/DIGESTS
    state_files:
      - core/state/pnt-sync-state.json
    execution:
      deterministic_stages:
        - state update
        - Notion and Gmail transport
      llm_stages:
        - headless sync reasoning
        - critical-path analysis
      llm_engine: claude_cli
      llm_model: claude-opus-4-6 for main run; haiku for failure alert path
      llm_model_changeability: code-pinned

  - id: project-refresh-evening
    enabled: true
    schedule_local: "Daily 14:35 America/New_York"
    launchd_label: com.matthewlieber.automation-work.project-refresh-evening
    script: core/automation/project-refresh.sh
    launchd_plist: core/automation/launchd-plists/com.brain.project-refresh-evening.plist
