        - contact extraction
      llm_engine: claude_cli
      llm_model: claude-opus-4-6
      llm_model_changeability: env-configurable

  - id: weekly-followup
    enabled: true
    schedule_local: "Friday 16:00 America/New_York"
    launchd_label: com.matthewlieber.automation-personal.weekly-followup
    script: core/automation/weekly-followup.sh
    launchd_plist: core/automation/launchd-plists/com.brain.weekly-followup.plist
    outputs:
      - logs/weekly-followup.log
      - Knowledge/DIGESTS
    state_files: []
    execution:
      deterministic_stages:
        - report write
        - deterministic email send
      llm_stages:
        - weekly scan and summary generation
      llm_engine: claude_cli
      llm_model: claude-opus-4-6
      llm_model_changeability: code-pinned

  - id: meeting-sync
    enabled: true
    schedule_local: "Daily 17:15 America/New_York"
    launchd_label: com.matthewlieber.automation-personal.meeting-sync
    script: core/automation/meeting-sync.sh
    launchd_plist: core/automation/launchd-plists/com.matthewlieber.automation-personal.meeting-sync.plist
    outputs:
      - Knowledge/TRANSCRIPTS
      - logs/meeting-sync.log
    state_files:
      - core/state/granola-sync.json
      - core/state/meeting-task-review.json
      - core/state/pending-tasks.md
    execution:
      deterministic_stages:
        - direct Granola fetch
        - transcript markdown writes
        - sync state update
