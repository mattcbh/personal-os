version: 2
last_updated: 2026-03-18
owner: Matt Lieber
description: Canonical runtime inventory for the Personal OS on the Mac Mini ("brain").

scheduler_policy:
  canonical_scheduler_host: homeserver@brain
  laptop_policy: "No Matt-managed launchd schedulers should be loaded on the laptop."
  install_rule: "Run runtime bootstrap installers only on the Mac Mini. Use --render-only on the laptop."
  system_health_label_on_brain: com.brain.system-health
  system_health_label_on_laptop: com.matthewlieber.laptop.system-health
  system_health_laptop_status: disabled
  verified_on: 2026-03-13

conventions:
  root: /Users/<user>/Obsidian/personal-os
  machine_config_root: /Users/<user>/Projects/automation-machine-config
  knowledge_digest_dir: Knowledge/DIGESTS
  knowledge_transcript_dir: Knowledge/TRANSCRIPTS
  state_dir: core/state
  logs_dir: logs

scheduled_jobs:
  - id: personal-poll-main
    enabled: true
    schedule_local: "Every 5 minutes America/New_York"
    launchd_label: com.matthewlieber.automation-personal.poll-main
    script: scripts/poll-main.sh
    launchd_plist: core/automation/launchd-plists/com.matthewlieber.automation-personal.poll-main.plist
    outputs:
      - logs/poll-main.log
    state_files:
      - .deploy/last-known-good-commit

  - id: daily-digest
    enabled: true
    schedule_local: "Daily 05:00 America/New_York"
    launchd_label: com.matthewlieber.automation-personal.daily-digest
    script: core/automation/daily-digest.sh
    launchd_plist: core/automation/launchd-plists/com.matthewlieber.daily-digest.plist
    outputs:
      - Knowledge/DIGESTS
      - logs/daily-digest.log
    state_files: []

  - id: monthly-goals-review
    enabled: true
    schedule_local: "Monday 09:00 America/New_York (full review on first Monday only)"
    launchd_label: com.matthewlieber.automation-personal.monthly-goals-review
    script: core/automation/monthly-goals-review.sh
    launchd_plist: core/automation/launchd-plists/com.matthewlieber.automation-personal.monthly-goals-review.plist
    outputs:
      - Knowledge/DIGESTS
      - inbox email with reply CTA
      - logs/monthly-goals-review.log
    state_files:
      - core/state/monthly-goals-review-state.txt

  - id: work-poll-main
    enabled: true
    schedule_local: "Every 5 minutes America/New_York"
    launchd_label: com.matthewlieber.automation-work.poll-main
    script: scripts/poll-main.sh
    launchd_plist: core/automation/launchd-plists/com.matthewlieber.automation-work.poll-main.plist
    outputs:
      - logs/poll-main.log
    state_files:
      - .deploy/last-known-good-commit

  - id: project-refresh-morning
    enabled: true
    schedule_local: "Daily 05:35 America/New_York"
    launchd_label: com.matthewlieber.automation-work.project-refresh-morning
    script: core/automation/project-refresh.sh
    launchd_plist: core/automation/launchd-plists/com.brain.project-refresh-morning.plist
    outputs:
      - logs/project-refresh-launchd.log
    state_files:
      - core/state/project-refresh-state.json
      - core/state/granola-sync.json
      - core/state/comms-events.jsonl

  - id: email-triage-v2-morning
    enabled: true
    schedule_local: "Daily 06:00 America/New_York"
    launchd_label: com.matthewlieber.automation-work.email-triage-v2-morning
    script: core/automation/email-triage-v2.sh
    launchd_plist: core/automation/launchd-plists/com.brain.email-triage-v2-morning.plist
    outputs:
      - Knowledge/DIGESTS
      - logs/email-triage-v2.log
    state_files:
      - core/state/email-triage-v2/triage-v2.db
      - core/state/email-triage-v2/outbox
      - core/state/email-triage-v2/artifacts
      - core/state/project-refresh-state.json

  - id: email-triage-v2-evening
    enabled: true
    schedule_local: "Daily 15:00 America/New_York"
    launchd_label: com.matthewlieber.automation-work.email-triage-v2-evening
    script: core/automation/email-triage-v2.sh
    launchd_plist: core/automation/launchd-plists/com.brain.email-triage-v2-evening.plist
    outputs:
      - Knowledge/DIGESTS
      - logs/email-triage-v2.log
    state_files:
      - core/state/email-triage-v2/triage-v2.db
      - core/state/email-triage-v2/outbox
      - core/state/email-triage-v2/artifacts
      - core/state/project-refresh-state.json

  - id: email-monitor
    enabled: true
    schedule_local: "Every 2 hours from 08:00 to 18:00 America/New_York"
    launchd_label: com.matthewlieber.automation-work.email-monitor
    script: core/automation/email-monitor.sh
    launchd_plist: core/automation/launchd-plists/com.brain.email-monitor.plist
    outputs:
      - logs/email-monitor.log
    state_files:
      - core/state/email-monitor-state.json
      - core/state/telegram-brain.json

  - id: comms-ingest
    enabled: true
    schedule_local: "Every 30 minutes America/New_York"
    launchd_label: com.matthewlieber.automation-work.comms-ingest
    script: core/automation/comms-ingest.sh
    launchd_plist: core/automation/launchd-plists/com.brain.comms-ingest.plist
    outputs:
      - logs/comms-ingest.log
      - core/state/comms-events.jsonl
    state_files:
      - core/state/comms-ingest-state.json
      - core/state/beeper-chat-watchlist.json

  - id: pnt-sync
    enabled: true
    schedule_local: "Daily 16:00 America/New_York"
    launchd_label: com.matthewlieber.automation-work.pnt-sync
    script: core/automation/pnt-sync.sh
    launchd_plist: core/automation/launchd-plists/com.brain.pnt-sync.plist
    outputs:
      - logs/pnt-sync.log
      - Knowledge/DIGESTS
    state_files:
      - core/state/pnt-sync-state.json

  - id: project-refresh-evening
    enabled: true
    schedule_local: "Daily 14:35 America/New_York"
    launchd_label: com.matthewlieber.automation-work.project-refresh-evening
    script: core/automation/project-refresh.sh
    launchd_plist: core/automation/launchd-plists/com.brain.project-refresh-evening.plist
    outputs:
      - logs/project-refresh-launchd.log
    state_files:
      - core/state/project-refresh-state.json
      - core/state/granola-sync.json
      - core/state/comms-events.jsonl

  - id: weekly-followup
    enabled: true
    schedule_local: "Friday 16:00 America/New_York"
    launchd_label: com.matthewlieber.automation-personal.weekly-followup
    script: core/automation/weekly-followup.sh
    launchd_plist: core/automation/launchd-plists/com.brain.weekly-followup.plist
    outputs:
      - logs/weekly-followup.log
      - Knowledge/DIGESTS
    state_files: []

  - id: meeting-sync
    enabled: true
    schedule_local: "Daily 21:00 America/New_York"
    launchd_label: com.matthewlieber.automation-personal.meeting-sync
    script: core/automation/meeting-sync.sh
    launchd_plist: core/automation/launchd-plists/com.brain.meeting-sync.plist
    outputs:
      - Knowledge/TRANSCRIPTS
      - logs/meeting-sync.log
    state_files:
      - core/state/granola-sync.json
      - core/state/pending-tasks.md

  - id: system-health
    enabled: true
    schedule_local: "Daily 07:10 America/New_York"
    launchd_label: com.brain.system-health
    script: bin/system-health.sh
    launchd_plist: launchd/system-health/com.brain.system-health.plist.template
    outputs:
      - logs/system-health.log
      - core/state/system-health.json
    state_files:
      - core/state/system-health.json

  - id: transcript-backfill
    enabled: false
    schedule_local: "Every 2 hours from 08:30 to 20:30 America/New_York (legacy)"
    launchd_label: com.brain.transcript-backfill
    script: core/automation/transcript-backfill.sh
    launchd_plist: core/automation/launchd-plists/com.brain.transcript-backfill.plist
    outputs:
      - logs/transcript-backfill.log
    state_files:
      - core/state/transcript-backfill.json

persistent_jobs:
  - id: telegram-bridge
    enabled: true
    mode: keepalive
    launchd_label: com.matthewlieber.automation-work.telegram-bridge
    script: core/automation/telegram-bridge.sh
    launchd_plist: core/automation/launchd-plists/com.brain.telegram-bridge.plist
    outputs:
      - logs/telegram-bridge.log
    state_files:
      - core/state/telegram-bridge-state.json
      - core/state/telegram-brain.json

manual_or_on_demand:
  - id: superhuman-draft-queue-writer
    script: core/automation/superhuman-draft.sh
    purpose: Writes draft requests to queue for stable binary execution.

  - id: superhuman-draft-queue-watcher
    script: core/automation/superhuman-draft-watcher.sh
    purpose: Watches queue and executes Superhuman UI automation.

  - id: meeting-sync-skill
    skill: core/integrations/granola/skills/meeting-sync/SKILL.md
    state_file: core/state/granola-sync.json

  - id: pnt-sync-skill
    skill: core/integrations/notion/skills/pnt-sync/SKILL.md
    state_file: core/state/pnt-sync-state.json

  - id: cfo-agent-skill
    skill: core/integrations/supabase/skills/cfo-agent/SKILL.md
    state_file: core/state/cfo-state.json

  - id: email-triage-v2-local-fallback
    script: core/automation/email-triage-v2.sh
    purpose: Queue-backed local fallback runner for cloud-first triage v2.
    state_files:
      - core/state/email-triage-v2/triage-v2.db
      - core/state/email-triage-v2/outbox
      - core/state/email-triage-v2/artifacts
      - core/state/project-refresh-state.json

  - id: email-triage-v2-cloud
    infra: core/automation/triage_v2/infra/gcp
    purpose: Cloud Run API/worker, Cloud Tasks queues, Cloud SQL, Scheduler, Secret Manager.

  - id: email-triage-v2-cutover-helper
    script: core/automation/setup-email-triage-v2-on-brain.sh
    purpose: Unloads v1 triage launchd jobs and loads v2 launchd jobs.

retired_or_not_present_in_repo: []
